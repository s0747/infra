apiVersion: v1
kind: Service
metadata:
  name: myapp-service-node
  namespace: k8s-wprawki
  labels:
    creator: created-by-XXX
    app: myapp
    ver: 1-2
    tier: frontend
spec:
  type: NodePort
  selector:
    app: myapp
    ver: 1-2
    tier: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 30000
