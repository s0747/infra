apiVersion: v1
kind: Pod
metadata:
  name: myapp-pod
  namespace: default
  labels:
    app: myapp-backend
    tier: backend
spec:
  containers:
    - name: myapp-container
      image: myapp:v1.2

      # Zoptymalizowana polityka: użyje lokalnego obrazu, jeśli istnieje
      imagePullPolicy: IfNotPresent
      #imagePullPolicy: Never

      # Port, na którym nasłuchuje nasza aplikacja Axum
      ports:
        - containerPort: 8080
          name: http

      # Konfiguracja zmiennych środowiskowych (env)
      env:
        - name: PORT
          value: "8080"
        - name: DATABASE_URL
          value: "sqlite:///data/app.db" # Przykładowa zmienna dla sondy /ready

      # 1. STARTUP PROBE: Daje aplikacji czas na uruchomienie się przy starcie.
      # K8s czeka, aż ta sonda przejdzie pomyślnie, zanim włączy pozostałe.
      startupProbe:
        httpGet:
          path: /live
          port: http
        failureThreshold: 6 # Pozwól na 6 nieudanych prób...
        periodSeconds: 5 # ...co 5 sekund (w sumie max 30 sekund na start)

      # 2. LIVENESS PROBE: Sprawdza, czy aplikacja nie uległa zawieszeniu (deadlock).
      # Jeśli zacznie zwracać błędy, k8s automatycznie zrestartuje kontener.
      livenessProbe:
        httpGet:
          path: /live
          port: http
        periodSeconds: 10 # Sprawdzaj co 10 sekund
        timeoutSeconds: 2 # Sonda ma 2 sekundy na odpowiedź

      # 3. READINESS PROBE: Sprawdza, czy baza danych i zasoby są gotowe.
      # Jeśli baza padnie, sonda zawiedzie, a k8s odłączy ruch z Service od tego Poda.
      readinessProbe:
        httpGet:
          path: /ready
          port: http
        periodSeconds: 5 # Sprawdzaj często (co 5 sekund)
        successThreshold: 1 # Wystarczy jeden sukces, by przywrócić ruch
        failureThreshold: 2 # Wystarczą dwie porażki, by odciąć ruch
