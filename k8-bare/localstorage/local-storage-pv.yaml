apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-lokalny-dysk
spec:
  capacity:
    storage: 2Gi # Rozmiar, jaki rezerwujesz
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  local:
    path: /mnt/data/app-storage #
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - NAZWA_TWOJEGO_SERWERA # Wpisz wynik z komendy 'kubectl get nodes'
