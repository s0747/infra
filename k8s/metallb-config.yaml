apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: domowa-pula-ip
  namespace: metallb-system
spec:
  addresses:
  - 192.168.8.200-192.168.8.220 # <-- Tutaj wpisz SWÓJ wolny zakres z routera
